# Render Blueprint – Between Takes
# https://render.com/docs/blueprint-spec

services:
  # ── Frontend (Static Site) ──────────────────────────────
  - type: web
    name: between-takes-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_TMDB_TOKEN
        sync: false
      - key: VITE_OMDB_API_KEY
        sync: false
      - key: VITE_AUTH_API_BASE
        sync: false
      - key: VITE_COMMENTS_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Auth Backend (Express + SQLite) ────────────────────
  - type: web
    name: between-takes-auth
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/database.sqlite
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  # ── Comments Backend (Express + MongoDB) ───────────────
  - type: web
    name: between-takes-comments
    runtime: node
    rootDir: between-takes-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
